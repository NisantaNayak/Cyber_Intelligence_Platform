services:
  postgres:
    image: postgres:16
    container_name: cip-postgres
    environment:
      POSTGRES_USER: cip
      POSTGRES_PASSWORD: cip
      POSTGRES_DB: cip
    ports:
      - "5544:5432"
    volumes:
      - cip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cip -d cip"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: cip-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cip_pgdata:
